<p *ngIf="weather.isLoading"><em>Loading...</em></p>

<span *ngIf="weather.isSunny">
      <img ngSrc="assets/icons/sun-fill.svg" alt="Sunny"
           height="60" width="60"/>
    </span>

<span *ngIf="!weather.isSunny">
      <img ngSrc="assets/icons/cloud-fill.svg" alt="Cloudy"
           height="60" width="60"/>
    </span>

<hr/>

<app-battery></app-battery>
