name: Build and Release for Raspberry Pi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run tests
      run: dotnet test --no-build --verbosity normal

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish for ARM32
      run: |
        dotnet publish HomeAutomation.Desktop/HomeAutomation.Desktop.csproj \
          -c Release \
          -r linux-arm \
          --self-contained \
          -o ./publish

    - name: Package release
      run: tar -czf homeautomation-desktop-linux-arm.tar.gz -C ./publish .

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: pi-${{ github.run_number }}
        name: Pi build ${{ github.run_number }}
        files: homeautomation-desktop-linux-arm.tar.gz
        make_latest: true
